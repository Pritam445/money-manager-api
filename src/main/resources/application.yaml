spring:
  application:
    name: MoneyManager

  datasource:
    url: jdbc:mysql://localhost:3306/money_manager
    username: root
    password: Root


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_USERNAME}
    password: ${BREVO_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          from: ${BREVO_FROM_EMAIL:pritamghanta445@gmail.com}
          starttls:
            enable: true
    protocol: smtp
  profiles:
    active:
      - ${SPRING_PROFILES_ACTIVE}





server:
  servlet:
    context-path: /api/v1.0
  port: 8082


jwt:
  secret: ${JWT_SECRET}

money:
  manager:
    frontend:
      url: ${MONEY_MANAGER_FRONTEND_URL:http://localhost:5173}

app:
  activation:
    url: ${MONEY_MANAGER_BACKEND_URL:http://localhost:8082 }

